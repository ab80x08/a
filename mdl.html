<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meherab's Delay Tracker</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            font-family: sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            min-height: 100vh;
            background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)), url('https://ab80x08.github.io/a/mh.png) center/cover fixed;
            background-attachment: fixed;
        }
        
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            pointer-events: none;
            z-index: -1;
        }
        
        .container { 
            width: 80%; 
            max-width: 800px; 
            margin-top: 50px; 
            padding: 30px; 
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.25);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }
        
        h2 { 
            color: #ffffff; 
            text-align: center; 
            margin-bottom: 20px;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
        }
        
        p {
            color: rgba(255, 255, 255, 0.8);
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.3);
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Meherab's Delay Logs</h2>
    <canvas id="delayChart"></canvas>
</div>

    <p><b>D1 = 1/4/2026</b><br>D2 = 3/4/2026<br>D3 = 4/4/2026<br>D4 = 5/4/2026<br>D5 = 10/4/2026<br>D6 = 11/4/2026<br>D7 = 13/4/2026<br>D8 = 16/4/2026<br>D9 = 17/4/2026<br>D10 = 18/4/2026<br><b>D11 = 22/4/2026</b><br>D12 = 24/4/2026</p>

<script>
    const taskData = [
        { day: 1, delay: 60 },
        { day: 2, delay: 7 },
        { day: 3, delay: 8 },
        { day: 4, delay: 0 },
        { day: 5, delay: 10.25 },
        { day: 6, delay: 8.15 },
        { day: 7, delay: 9.5 },
        { day: 8, delay: 0 },
        { day: 9, delay: 6.75 },
        { day: 10, delay: 11.5 },
        { day: 11, delay: 5 },
        { day: 12, delay: 13 }
    ];
    
    const ctx = document.getElementById('delayChart').getContext('2d');
    
    new Chart(ctx, {
        type: 'line', 
        data: {
            labels: taskData.map(item => `D${item.day}`), // X-Axis Labels
            datasets: [{
                label: 'Delay (Minutes)',
                data: taskData.map(item => item.delay), // Y-Axis Data
                borderColor: '#3e95cd',
                backgroundColor: 'rgba(62, 149, 205, 0.2)',
                fill: true,
                tension: 0.25, // Makes the line curvy
                borderWidth: 1.2
            }]
        },
        options: {
            scales: {
                x: { title: { display: true, text: 'Days of class' } },
                y: { 
                    beginAtZero: true,
                    title: { display: true, text: 'Delay in Minutes' } 
                }
            }
        }
    });
</script>

</body>
</html>
